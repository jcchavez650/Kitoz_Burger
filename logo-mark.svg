<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <linearGradient id="kbun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb347"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </linearGradient>
  </defs>

  <!-- bottom bun -->
  <path d="M7 43 h42 v1 a6 6 0 0 1 -6 6 H13 a6 6 0 0 1 -6 -6 z" fill="url(#kbun)"/>

  <!-- filling (dark) that carries the KB monogram -->
  <rect x="7" y="26.5" width="42" height="17" rx="4.5" fill="#15131a"/>

  <!-- lettuce ruffle -->
  <path d="M6 25.5 h44 v1
           a2.6 2.6 0 0 1 -5.2 0 a2.6 2.6 0 0 1 -5.2 0 a2.6 2.6 0 0 1 -5.2 0
           a2.6 2.6 0 0 1 -5.2 0 a2.6 2.6 0 0 1 -5.2 0 a2.6 2.6 0 0 1 -5.2 0
           a2.6 2.6 0 0 1 -5.2 0 a2.6 2.6 0 0 1 -1.6 -1 z" fill="#74b83a"/>

  <!-- top bun -->
  <path d="M8 26 C8 10 48 10 48 26 Z" fill="url(#kbun)"/>

  <!-- sesame -->
  <g fill="#ffe9c7">
    <ellipse cx="21" cy="20" rx="1.8" ry="1" transform="rotate(-20 21 20)"/>
    <ellipse cx="28" cy="17.5" rx="1.8" ry="1" transform="rotate(6 28 17.5)"/>
    <ellipse cx="35" cy="20" rx="1.8" ry="1" transform="rotate(20 35 20)"/>
  </g>

  <!-- KB monogram -->
  <text x="28" y="40" text-anchor="middle" fill="#ffffff"
        font-family="'Arial Black', Montserrat, Arial, sans-serif" font-weight="900"
        font-size="14" letter-spacing="-1">KB</text>
</svg>
